name: Build & Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  REGISTRY: docker.io

jobs:
  build:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    strategy:
      matrix:
        service:
          - name: api-gateway
            path: backend
            dockerfile: backend/api-gateway/Dockerfile
            image: ecommerce-api-gateway
            
          - name: product-service
            path: backend
            dockerfile: backend/services/product/Dockerfile
            image: ecommerce-product
            
          - name: order-service
            path: backend
            dockerfile: backend/services/order/Dockerfile
            image: ecommerce-order
            
          - name: user-service
            path: backend
            dockerfile: backend/services/user/Dockerfile
            image: ecommerce-user
            
          - name: payment-service
            path: backend
            dockerfile: backend/services/payment/Dockerfile
            image: ecommerce-payment
            
          - name: frontend
            path: frontend
            dockerfile: frontend/Dockerfile
            image: ecommerce-frontend
      
      max-parallel: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "✅ ${{ matrix.service.name }} pushed - ${{ steps.meta.outputs.tags }}"